<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scroll Reveal Scenario</title>
    <style>
      body {
        margin: 0;
        background: #f4efe8;
        font-family: Georgia, "Times New Roman", serif;
        color: #2f241d;
      }

      main {
        width: min(760px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 28px 0 80px;
      }

      .hero {
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 16px 40px rgba(83, 57, 31, 0.1);
      }

      .spacer {
        height: 1500px;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 24px;
        box-shadow: 0 16px 40px rgba(67, 43, 22, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Scroll To Reveal</h1>
        <p>Always-on mode should translate this image only after it enters the viewport.</p>
      </section>

      <div class="spacer"></div>

      <img
        id="reveal-image"
        alt="revealed after scroll"
        src="/assets/reddit-dark-ui.png"
        width="653"
        height="577"
      />
    </main>
  </body>
</html>
