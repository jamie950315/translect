<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mutation Insert Scenario</title>
    <style>
      body {
        margin: 0;
        background:
          linear-gradient(180deg, #f7f2ea 0%, #eef3fb 100%);
        font-family: Georgia, "Times New Roman", serif;
        color: #2d241e;
      }

      main {
        width: min(760px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 32px 0 80px;
      }

      .hero,
      .mount {
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 40px rgba(83, 57, 31, 0.1);
      }

      .mount {
        margin-top: 24px;
        min-height: 220px;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 24px;
        box-shadow: 0 16px 40px rgba(67, 43, 22, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Mutation Observer</h1>
        <p>Always-on mode should translate images that are inserted after the page is already open.</p>
      </section>

      <section id="mount" class="mount">
        <p>Image not inserted yet.</p>
      </section>
    </main>

    <script>
      window.insertScenarioImage = () => {
        const mount = document.getElementById("mount");
        if (mount.querySelector("img")) {
          return;
        }

        mount.innerHTML = "";
        const image = document.createElement("img");
        image.id = "mutation-image";
        image.alt = "inserted later";
        image.width = 640;
        image.height = 180;
        image.src = "/assets/reddit-white-ui.png";
        mount.append(image);
      };
    </script>
  </body>
</html>
